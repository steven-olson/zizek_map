services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zizek
      POSTGRES_PASSWORD: zizek
      POSTGRES_DB: zizek
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zizek -d zizek"]
      interval: 2s
      timeout: 3s
      retries: 20

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres

  dozzle:
    image: amir20/dozzle:latest
    restart: unless-stopped
    ports:
      - "9999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://zizek:zizek@postgres:5432/zizek
      APP_BOOKS_DIR: /app/books
    env_file:
      - path: .env
        required: false
    volumes:
      - ./books:/app/books:ro
      - ./local_scripts:/app/local_scripts:ro
    tty: true
    stdin_open: true

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

  dozzle:
    image: amir20/dozzle:latest
    ports:
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  pgdata:
